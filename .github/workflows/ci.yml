name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile check
        working-directory: backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/agents/graph.py
          python -m py_compile app/agents/agent_base.py
          python -m py_compile app/rag/retriever.py
          python -m py_compile app/rag/anti_hallucination.py
          python -m py_compile app/services/metrics.py
          python -m py_compile app/api/routes.py

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test coverage
        working-directory: backend
        run: |
          python -m pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: backend/coverage.xml
