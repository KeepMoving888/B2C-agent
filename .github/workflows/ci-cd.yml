name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/app.py
          python -m py_compile src/config/settings.py
          python -m py_compile src/agents/base.py
      
      - name: Check import test
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); from config import settings; print('✓ Settings import OK')"
          python -c "import sys; sys.path.insert(0, 'src'); from agents import base; print('✓ Base import OK')"
          python -c "import sys; sys.path.insert(0, 'src'); from agents import fast_routing; print('✓ Fast routing import OK')"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/b2c-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/b2c-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
