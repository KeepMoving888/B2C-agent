version: "3.9"

services:
  # ========== Milvus 向量数据库 ==========
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-24T21-41-23Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ========== vLLM 推理服务（需自行准备模型权重） ==========
  # 取消注释并配置 MODEL_PATH 后启用真实大模型推理
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   runtime: nvidia
  #   environment:
  #     - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
  #   volumes:
  #     - ./deployment/vllm/models:/models
  #   command: --model /models/Qwen2.5-7B-Instruct-AWQ --quantization awq --max-model-len 4096 --gpu-memory-utilization 0.9
  #   ports:
  #     - "8001:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # ========== 后端服务 ==========
  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/backend.Dockerfile
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-EMPTY}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen2.5-7B-Instruct}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - AUTO_BUILD_INDEX=true
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      milvus:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ========== 前端 ==========
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deployment/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend


  # ===== Elasticsearch（BM25 稀疏检索） =====
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cs-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ===== Kafka（多平台消息接入层） =====
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: cs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: cs-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ===== PostgreSQL（业务数据持久化） =====
  postgres:
    image: postgres:16-alpine
    container_name: cs-postgres
    environment:
      POSTGRES_DB: cs_platform
      POSTGRES_USER: cs_admin
      POSTGRES_PASSWORD: cs_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # ===== Redis（缓存与会话状态） =====
  redis:
    image: redis:7-alpine
    container_name: cs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===== Jaeger（全链路追踪） =====
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: cs-jaeger
    ports:
      - "6831:6831/udp"   # agent
      - "16686:16686"     # UI

  # ===== Prometheus + Grafana（监控） =====
  prometheus:
    image: prom/prometheus:latest
    container_name: cs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana:latest
    container_name: cs-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  es_data:
  pg_data:
  redis_data:

volumes:
  etcd_data:
  minio_data:
  milvus_data:
