# AWQ 量化配置

# 待量化模型路径（QLoRA 微调后的输出 或 基座模型）
model_path: ../qlora/outputs/final

# 量化模型输出路径
output_path: ./outputs/awq

# 量化参数
bits: 4               # 量化位数（4-bit 性价比最高）
group_size: 128       # 分组大小，越大压缩率越高，精度略降

# 校准数据集
calib_data: pileval   # 内置校准数据，也可指定自定义数据集路径

# 量化配置（autoawq 参数）
quant_config:
  zero_point: true
  q_group_size: 128
  w_bit: 4
  version: GEMM        # GEMM 适合 GPU 推理，GEMV 适合 CPU
